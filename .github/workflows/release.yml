name: Build & Draft Release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ""
          - os: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Import Apple signing certificate
        if: runner.os == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_CERT_P12_BASE64 }}" | base64 --decode > /tmp/apple-cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/apple-cert.p12 -k ~/Library/Keychains/build.keychain -P "${{ secrets.APPLE_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s ~/Library/Keychains/build.keychain
          security set-keychain-settings -t 3600 -u ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain

      - name: Store App Store Connect credentials
        if: runner.os == 'macos-latest'
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > /tmp/AuthKey.p8
          xcrun notarytool store-credentials "ac-credentials" --key /tmp/AuthKey.p8 --key-id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" --issuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTARYTOOL_PROFILE: ac-credentials
        with:
          projectPath: src-tauri
          args: ${{ matrix.args }}
          tagName: manual-${{ github.run_number }}
          releaseName: "Manual Release (Run #${{ github.run_number }})"
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch]-[bundle][ext]"

