name: Build & Draft Release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ""
          - os: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Import Apple signing certificate
        if: matrix.os == 'macos-latest'
        run: |
          echo "${{ secrets.APPLE_CERT_P12_BASE64 }}" | base64 --decode > /tmp/apple-cert.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security import /tmp/apple-cert.p12 -k ~/Library/Keychains/build.keychain -P "${{ secrets.APPLE_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-keychain-settings -u -t 3600 ~/Library/Keychains/build.keychain
          security list-keychains -s ~/Library/Keychains/build.keychain
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain
          security find-identity -v -p codesigning ~/Library/Keychains/build.keychain

      - name: Store App Store Connect credentials
        if: matrix.os == 'macos-latest'
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 --decode > /tmp/AuthKey.p8
          xcrun notarytool store-credentials "ac-credentials" --key /tmp/AuthKey.p8 --key-id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" --issuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Configure macOS signing values
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ] || [ -z "$APPLE_PROVIDER_SHORT_NAME" ]; then
            echo "APPLE_SIGNING_IDENTITY and APPLE_PROVIDER_SHORT_NAME secrets are required for macOS signing" >&2
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["bundle"]["macOS"]["signingIdentity"] = os.environ["APPLE_SIGNING_IDENTITY"]
          data["bundle"]["macOS"]["providerShortName"] = os.environ["APPLE_PROVIDER_SHORT_NAME"]
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTARYTOOL_PROFILE: ac-credentials
        with:
          projectPath: src-tauri
          args: ${{ matrix.args }}
          tagName: manual-${{ github.run_number }}
          releaseName: "Manual Release (Run #${{ github.run_number }})"
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch]-[bundle][ext]"

