name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ""

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
